{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="{% static 'css/style.css' %}">
<link href='https://unpkg.com/boxicons@2.1.1/css/boxicons.min.css' rel='stylesheet'>

<title>Employee Management</title>

<style>

/* GLOBAL */
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f172a,#1e1b4b);
}

/* SIDEBAR */
.sidebar{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
box-shadow:0 8px 32px rgba(0,0,0,0.3);
width:260px;
border-right:1px solid rgba(255,255,255,0.1);
}

/* LOGO */
.logo-text .name{
font-weight:700;
color:#facc15;   /* GOLD */
font-size:18px;
}
.logo-text .profession{
font-size:12px;
color:#fde68a;   /* LIGHT GOLD */
}

/* MENU */
.menu-links{
margin-top:25px;
}

.menu-links li{
margin:6px 12px;
}

/* LINKS */
.menu-links li a{
display:flex;
align-items:center;
gap:12px;
padding:12px 16px;
border-radius:12px;
transition:0.3s;
color:#e5e7eb;
font-weight:500;
}

/* ICON */
.menu-links li a .icon{
font-size:20px;
color:#d4d4d8;
min-width:20px;
transition:0.3s;
}

/* HOVER */
.menu-links li a:hover{
background:rgba(250,204,21,0.15);
color:#facc15;
transform:translateX(5px);
}

.menu-links li a:hover .icon{
color:#facc15;
}

/* ACTIVE */
.menu-links li a.active{
background:linear-gradient(135deg,#facc15,#eab308);
color:#020617;
box-shadow:0 6px 20px rgba(250,204,21,0.5);
}

.menu-links li a.active .icon{
color:#020617;
}

/* LOGOUT BUTTON */
.bottom-content{
margin-top:30px;
padding:15px;
}

.bottom-content a{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:12px;
border-radius:50px;
background:linear-gradient(135deg,#ef4444,#dc2626);
color:#fff;
font-weight:600;
box-shadow:0 6px 20px rgba(239,68,68,0.5);
transition:0.3s;
}

/* ICON RED ALWAYS */
.bottom-content a .icon{
color:#dc2626 !important;
background:#fff;
padding:6px;
border-radius:50%;
}

/* HOVER */
.bottom-content a:hover{
transform:translateY(-2px) scale(1.03);
box-shadow:0 10px 25px rgba(239,68,68,0.6);
}

/* KEEP ICON RED */
.bottom-content a:hover .icon{
color:#dc2626 !important;
background:#fff;
}

/* TOGGLE */
.toggle{
font-size:22px;
cursor:pointer;
color:#facc15;   /* GOLD */
}

/* CONTENT AREA SHIFT */
.home{
margin-left:260px;
padding:20px;
}

/* REMOVE EXTRA SPACE */
section{
margin-bottom:0 !important;
padding-bottom:0 !important;
}

</style>

</head>

<body>

<nav class="sidebar close">

<header>
<div class="image-text">
<span class="image">
<img src="{% static 'assets/logo.png' %}" alt="logo">
</span>

<div class="text logo-text">
<span class="name">Employee</span>
<span class="profession">Management</span>
</div>
</div>

<i class='bx bx-chevron-right toggle'></i>
</header>

<div class="menu-bar">

<div class="menu">
<ul class="menu-links">

<li class="nav-link">
<a href="/ems/dashboard" class="active">
<i class='bx bx-home-alt icon'></i>
<span class="text nav-text">Dashboard</span>
</a>
</li>

<li class="nav-link">
<a href="/ems/assignwork">
<i class='bx bx-briefcase icon'></i>
<span class="text nav-text">Assign Work</span>
</a>
</li>

<li class="nav-link">
<a href="/ems/notice">
<i class='bx bx-bell icon'></i>
<span class="text nav-text">Notice</span>
</a>
</li>

<li class="nav-link">
<a href="/ems/makeRequest">
<i class='bx bx-message-square-detail icon'></i>
<span class="text nav-text">Request</span>
</a>
</li>

<li class="nav-link">
<a href="/ems/attendance">
<i class='bx bx-calendar-check icon'></i>
<span class="text nav-text">Attendance</span>
</a>
</li>

<li class="nav-link">
<a href="/ems/mywork">
<i class='bx bx-task icon'></i>
<span class="text nav-text">My Work</span>
</a>
</li>

<li class="nav-link">
<a href="/ems/editAW">
<i class='bx bx-edit icon'></i>
<span class="text nav-text">Edit Assigned Work</span>
</a>
</li>

</ul>
</div>

<div class="bottom-content">
<li>
<a href="/logout">
<i class='bx bx-log-out icon'></i>
<span class="text nav-text">Logout</span>
</a>
</li>
</div>

</div>

</nav>

{% block content %}
{% endblock %}

<script src="{% static 'js/script.js' %}"></script>

</body>
</html>

{% extends 'base.html' %}

{% block content %}

<style>

body{
background:linear-gradient(135deg,#0f172a,#1e1b4b);
font-family:'Poppins',sans-serif;
}

/* Section */

.home{
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
padding-top:30px;
padding-left:60px;
padding-right:20px;
color:#ffffff;
}

/* Title */

.page-title{
font-size:28px;
font-weight:700;
margin-bottom:20px;
color:#5b5bce;
}

/* Container */

.request-list{
width:100%;
max-width:800px;
}

/* Card */

.request-card{
background:#1e293b;
padding:20px;
border-radius:16px;
margin-bottom:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
border:1px solid rgba(255,255,255,0.05);
transition:0.3s;
}

.request-card:hover{
transform:translateY(-4px);
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

/* Text */

.label{
color:#facc15;
font-size:13px;
}

.value{
color:#cbd5f5;
font-size:14px;
}

/* Button */

.view-btn{
display:inline-block;
margin-top:10px;
padding:8px 14px;
background:#9b43ed;
color:#fff;
border-radius:8px;
text-decoration:none;
font-size:13px;
transition:0.3s;
}

.view-btn:hover{
background:#7e22ce;
}

</style>

<section class="home">

<div>

<div class="page-title">
📬 View Requests
</div>

<div class="request-list">

{% for info in requests %}

<div class="request-card">

<p class="label">Requested By</p>
<p class="value">{{ info.requesterId }}</p>

<p class="label">Request Date</p>
<p class="value">{{ info.requestDate }}</p>

<p class="label">Request Message</p>
<p class="value">{{ info.requestMessage|truncatechars:80 }}</p>

<a href="{% url 'requestdetails' rid=info.id %}" class="view-btn">
View Details
</a>

</div>

{% endfor %}

</div>

</div>

</section>

{% endblock %}

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Up</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Ubuntu',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(-45deg,#667eea,#764ba2,#6a11cb,#2575fc);
background-size:400% 400%;
animation:gradientMove 10s ease infinite;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.signup{
width:850px;
display:flex;
border-radius:20px;
overflow:hidden;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
box-shadow:0 10px 35px rgba(0,0,0,0.35);
}

.imgs{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
}

.imgs img{
width:90%;
border-radius:10px;
}

.signup-form{
flex:1;
padding:60px;
color:white;
}

.signup-form h2{
margin-bottom:35px;
font-size:30px;
font-weight:600;
}

.signup-form label{
font-size:14px;
}

.signup-form input[type=text],
.signup-form input[type=password]{
width:100%;
padding:14px 18px;
margin:10px 0 22px 0;
border:none;
border-radius:30px;
outline:none;
font-size:14px;
background:rgba(255,255,255,0.9);
transition:0.3s;
}

.signup-form input:focus{
box-shadow:0 0 10px rgba(105,92,254,0.7);
}

.signup-form input[type=submit]{
width:100%;
padding:14px;
background:#695CFE;
border:none;
border-radius:30px;
color:white;
font-size:15px;
font-weight:500;
cursor:pointer;
transition:0.3s;
}

.signup-form input[type=submit]:hover{
background:#574bce;
transform:scale(1.03);
}

.signup-form a{
color:#fff;
text-decoration:none;
font-size:14px;
}

.signup-form a:hover{
text-decoration:underline;
}

.msg{
margin-top:15px;
}

.success{
color:#4dff88;
}

.error{
color:#ff4d4d;
}

@media(max-width:900px){

.signup{
flex-direction:column;
width:90%;
}

.imgs{
display:none;
}

}

</style>
</head>

<body>

<div class="signup">

<div class="imgs">
<img src="{% static 'assets/welcome.webp' %}" alt="Welcome">
</div>

<div class="signup-form">

<h2>Create Account</h2>

<form method="post">
{% csrf_token %}

<label>User ID</label>
<input type="text" name="id" placeholder="Enter User ID" required>

<label>Password</label>
<input type="password" name="password" placeholder="Enter Password" required>

<label>Confirm Password</label>
<input type="password" name="cnfpass" placeholder="Confirm Password" required>

<input type="submit" value="Sign Up">

<br><br>

<a href="{% url 'login_user' %}">Already have an account? Login</a>

<div class="msg">
{% for msg in messages %}
    {% if msg == "Registered Successfully" %}
        <div class="success">
            {{ msg }} -
            <a href="{% url 'login' %}">Login Now</a>
        </div>
    {% else %}
        <div class="error">{{ msg }}</div>
    {% endif %}
{% endfor %}
</div>

</form>

</div>

</div>

</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Up</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center font-sans
bg-gradient-to-r from-indigo-500 via-purple-600 to-blue-500">

<div class="backdrop-blur-xl bg-white/20 border border-white/30 
shadow-2xl rounded-3xl flex flex-col md:flex-row 
w-full max-w-4xl overflow-hidden">

<!-- Left Image -->
<div class="md:w-1/2 hidden md:flex items-center justify-center p-6">

<img src="{% static 'assets/welcome.webp' %}" 
alt="Welcome"
class="w-3/4 object-cover rounded-3xl shadow-2xl border border-white/40
transition duration-700 hover:scale-110 hover:rotate-1">

</div>


<!-- Form Section -->
<div class="md:w-1/2 p-10 flex flex-col justify-center text-white">

<h2 class="text-3xl font-bold mb-8 text-center">Create Account</h2>

<form method="post" class="space-y-5">

{% csrf_token %}

<div>
<label class="block text-sm mb-1">User ID</label>
<input type="text" name="id" required
class="w-full px-4 py-3 rounded-full bg-white/80 text-gray-800
focus:outline-none focus:ring-2 focus:ring-purple-500 transition">
</div>

<div>
<label class="block text-sm mb-1">Password</label>
<input type="password" name="password" required
class="w-full px-4 py-3 rounded-full bg-white/80 text-gray-800
focus:outline-none focus:ring-2 focus:ring-purple-500 transition">
</div>

<div>
<label class="block text-sm mb-1">Confirm Password</label>
<input type="password" name="cnfpass" required
class="w-full px-4 py-3 rounded-full bg-white/80 text-gray-800
focus:outline-none focus:ring-2 focus:ring-purple-500 transition">
</div>

<div class="pt-2 flex justify-center">

<button type="submit"
class="px-8 py-3 rounded-full
bg-gradient-to-r from-purple-600 to-pink-500
hover:scale-105 transition
shadow-lg text-white font-semibold">

Sign Up

</button>

</div>

</form>

{% if messages %}
<div class="mt-6 space-y-2 text-center">
{% for msg in messages %}
{% if msg == "Registered Successfully" %}
<div class="text-green-300 font-medium">
{{ msg }} -
<a href="{% url 'login' %}" class="underline">Login Now</a>
</div>
{% else %}
<div class="text-red-300 font-medium">{{ msg }}</div>
{% endif %}
{% endfor %}
</div>
{% endif %}

<p class="mt-6 text-center text-sm text-white/80">
Already have an account?
<a href="{% url 'login_user' %}" class="underline">Login here</a>
</p>

</div>

</div>

</body>
</html>

{% extends 'base.html' %}

{% block content %}

<style>

/* RESET */
html, body{
margin:0;
padding:0;
background:linear-gradient(135deg,#0f172a,#1e1b4b);
font-family:'Poppins',sans-serif;
}

/* SECTION */
.home{
display:flex;
justify-content:center;
align-items:flex-start;
padding:30px 20px;
}

/* CONTAINER */
.detail-container{
width:100%;
max-width:900px;
}

/* TITLE */
.page-title{
text-align:center;
font-size:28px;
font-weight:700;
margin-bottom:20px;
color:#6fe919;
}

/* CARD */
.detail-card{
background:#1e293b;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
border:1px solid rgba(255,255,255,0.05);
overflow:hidden;
}

/* TABLE */
.detail-table{
width:100%;
border-collapse:collapse;
}

/* HEADER */
.detail-table thead{
background:#020617;
}

.detail-table th{
text-align:left;
padding:14px;
color:#facc15;
font-size:15px;
}

/* ROW */
.detail-table td{
padding:14px;
border-top:1px solid rgba(255,255,255,0.05);
}

/* LABEL */
.label{
color:#facc15;
font-weight:500;
}

/* VALUE */
.value{
color:#cbd5f5;
}

/* HOVER */
.detail-table tr:hover{
background:rgba(255,255,255,0.03);
}

/* REMOVE GAP */
section{
margin-bottom:0 !important;
padding-bottom:0 !important;
}

</style>

<section class="home">

<div class="detail-container">

<div class="page-title">
📌 Work Details
</div>

<div class="detail-card">

<table class="detail-table">

<thead>
<tr>
<th>Work Info</th>
<th></th>
</tr>
</thead>

<tbody>

<tr>
<td class="label">Assigned By</td>
<td class="value">{{ workdetails.assignerId }}</td>
</tr>

<tr>
<td class="label">Assigned To</td>
<td class="value">{{ workdetails.taskerId }}</td>
</tr>

<tr>
<td class="label">Work Description</td>
<td class="value">{{ workdetails.work }}</td>
</tr>

<tr>
<td class="label">Assigned Date</td>
<td class="value">{{ workdetails.assignDate }}</td>
</tr>

<tr>
<td class="label">Due Date</td>
<td class="value">{{ workdetails.dueDate }}</td>
</tr>

</tbody>

</table>

</div>

</div>

</section>

{% endblock %}

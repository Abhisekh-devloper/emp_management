
{% extends 'base.html' %}

{% block content %}

<style>

/* RESET */
html, body{
margin:0;
padding:0;
background:linear-gradient(135deg,#0f172a,#1e1b4b);
font-family:'Poppins',sans-serif;
}

/* SECTION */
.home{
display:flex;
justify-content:center;
align-items:flex-start;
padding:30px 20px;
}

/* CONTAINER */
.work-container{
width:100%;
max-width:900px;
}

/* TITLE */
.page-title{
text-align:center;
font-size:28px;
font-weight:700;
margin-bottom:20px;
color:#5b5bce;
}

/* CARD */
.work-card{
background:#1e293b;
border-radius:16px;
padding:16px;
margin-bottom:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
border:1px solid rgba(255,255,255,0.05);
transition:0.3s;
}

.work-card:hover{
transform:translateY(-3px);
box-shadow:0 15px 30px rgba(0,0,0,0.6);
}

/* HEADER */
.card-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:8px;
}

.card-title{
font-size:16px;
font-weight:600;
color:#e2e8f0;
}

.highlight{
color:#6fe919;
}

/* DATE */
.date{
font-size:13px;
color:#94a3b8;
}

/* TEXT */
.card-text{
font-size:14px;
color:#cbd5f5;
margin-top:5px;
}

/* BUTTON */
.btn{
display:inline-block;
margin-top:10px;
padding:6px 14px;
background:#6fe919;
color:#020617;
border-radius:8px;
font-size:13px;
font-weight:500;
text-decoration:none;
transition:0.3s;
}

.btn:hover{
background:#4ade80;
}

/* REMOVE BOTTOM GAP */
section{
margin-bottom:0 !important;
padding-bottom:0 !important;
}

</style>

<section class="home">

<div class="work-container">

<div class="page-title">
📝 My Work
</div>

{% for info in work %}

<div class="work-card">

<div class="card-header">
<div class="card-title">
Work Assigned By: 
<span class="highlight">{{ info.assignerId }}</span>
</div>

<div class="date">
Due: {{ info.dueDate }}
</div>
</div>

<div class="card-text">
Assigned Date: <b>{{ info.assignDate }}</b>
</div>

<div class="card-text">
<b>Work Details:</b> {{ info.work }}
</div>

<div style="text-align:right;">
<a href="{% url 'workdetails' wid=info.id %}" class="btn">
View Details
</a>
</div>

</div>

{% endfor %}

</div>

</section>

{% endblock %}

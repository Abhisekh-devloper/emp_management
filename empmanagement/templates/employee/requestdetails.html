{% extends 'base.html' %}

{% block content %}

<style>

body{
background:linear-gradient(135deg,#0f172a,#1e1b4b);
font-family:'Poppins',sans-serif;
}

/* Section */

.home{
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
padding-top:30px;
padding-left:60px;
padding-right:20px;
color:#ffffff;
}

/* Title */

.page-title{
font-size:28px;
font-weight:700;
margin-bottom:20px;
color:#6fe919;
}

/* Card */

.request-detail-card{
width:100%;
max-width:800px;
background:#1e293b;
border-radius:18px;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
border:1px solid rgba(255,255,255,0.05);
overflow:hidden;
}

/* Table */

.request-table{
width:100%;
border-collapse:collapse;
}

/* Header */

.request-table thead{
background:#0f172a;
}

.request-table th{
text-align:left;
padding:15px;
color:#facc15;
font-size:16px;
}

/* Rows */

.request-table td{
padding:14px;
border-top:1px solid rgba(255,255,255,0.05);
}

/* Labels */

.label{
color:#facc15;
font-weight:500;
}

/* Values */

.value{
color:#cbd5f5;
}

/* Hover */

.request-table tr:hover{
background:rgba(255,255,255,0.03);
}

</style>

<section class="home">

<div>

<div class="page-title">
📄 Request Details
</div>

<div class="request-detail-card">

<table class="request-table">

<thead>
<tr>
<th>Request Info</th>
<th></th>
</tr>
</thead>

<tbody>

<tr>
<td class="label">Requested By</td>
<td class="value">{{ requestdetail.requesterId }}</td>
</tr>

<tr>
<td class="label">Request To</td>
<td class="value">{{ requestdetail.destinationEmployeeId }}</td>
</tr>

<tr>
<td class="label">Request Message</td>
<td class="value">{{ requestdetail.requestMessage }}</td>
</tr>

<tr>
<td class="label">Requested Date</td>
<td class="value">{{ requestdetail.requestDate }}</td>
</tr>

</tbody>

</table>

</div>

</div>

</section>

{% endblock %}

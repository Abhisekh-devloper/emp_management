{% extends 'base.html' %}

{% block content %}

<style>

body{
background:linear-gradient(135deg,#0f172a,#1e1b4b);
font-family:'Poppins',sans-serif;
}

/* Section */

.home{
padding:40px;
color:#ffffff;
}

/* Title */

.page-title{
font-size:30px;
font-weight:700;
margin-bottom:20px;
color:#6fe919;
font-family:'Times New Roman', Times, serif;
}

/* Card */

.assign-card{
background:#1e293b;
border-radius:18px;
padding:35px;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
border:1px solid rgba(255,255,255,0.05);

width:100%;
max-width:1000px;
margin-top:10px;
}

/* 🔥 Labels (PROFESSIONAL YELLOW) */

.assign-card label{
display:block;
margin-bottom:6px;
font-size:14px;
font-weight:500;
color:#facc15;  /* soft yellow */
letter-spacing:0.3px;
}

/* Inputs */

.assign-card input,
.assign-card select,
.assign-card textarea{
width:100%;
padding:12px 15px;
margin-bottom:18px;
border-radius:10px;
border:none;
outline:none;
background:#0f172a;
color:#fff;
font-size:14px;
transition:0.3s;
}

/* Focus Effect */

.assign-card input:focus,
.assign-card select:focus,
.assign-card textarea:focus{
box-shadow:0 0 12px rgba(250,204,21,0.6); /* yellow glow */
}

/* Button */

.submit-btn{
width:100%;
padding:14px;
background:#9b43ed;
border:none;
border-radius:12px;
color:white;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.submit-btn:hover{
background:#7e22ce;
transform:translateY(-2px);
}

/* Success Message */

.success-msg{
margin-bottom:15px;
color:#4dff88;
font-weight:600;
}

</style>

<section class="home">

<div class="page-title">
📝 Assign Work
</div>

<div class="assign-card">

{% if flag != "" %}
<div class="success-msg">
{{ flag }}
</div>
{% endif %}

<form method="post">
{% csrf_token %}

<div hidden>{{ form.assignerId }}</div>

<label>Select Employee</label>
{{ form.taskerId }}

<label>Work Details</label>
{{ form.work }}

<label>Assign Date</label>
{{ form.assignDate }}

<label>Due Date</label>
{{ form.dueDate }}

<button type="submit" class="submit-btn">
Submit
</button>

</form>

</div>

</section>

{% endblock %}

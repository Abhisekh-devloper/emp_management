
{% extends 'base.html' %}

{% block content %}

<style>

/* RESET EVERYTHING */
html, body {
margin: 0;
padding: 0;
height: auto;
background: linear-gradient(135deg,#0f172a,#1e1b4b);
font-family: 'Poppins', sans-serif;
}

/* MAIN SECTION */
.home{
display:flex;
justify-content:center;
align-items:flex-start;
padding:30px 20px;
margin:0;
}

/* CONTAINER */
.work-container{
width:100%;
max-width:1200px;
margin:0 auto;
}

/* TITLE */
.page-title{
font-size:28px;
font-weight:700;
margin-bottom:25px;
color:#5b5bce;
}

/* GRID */
.work-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

/* CARD */
.work-card{
background:#1e293b;
padding:20px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
border:1px solid rgba(255,255,255,0.05);
transition:0.3s;
}

.work-card:hover{
transform:translateY(-5px);
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

/* TEXT */
.label{
color:#facc15;
font-size:13px;
}

.value{
color:#cbd5f5;
font-size:14px;
margin-bottom:8px;
}

/* BUTTONS */
.btn-group{
margin-top:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
padding:8px 14px;
border-radius:8px;
font-size:13px;
text-decoration:none;
transition:0.3s;
}

/* VIEW */
.btn-view{
background:#9b43ed;
color:white;
}

.btn-view:hover{
background:#7e22ce;
}

/* EDIT */
.btn-edit{
border:1px solid #9b43ed;
color:#9b43ed;
}

.btn-edit:hover{
background:#9b43ed;
color:white;
}

/* DELETE */
.btn-delete{
background:#ef4444;
color:white;
}

.btn-delete:hover{
background:#dc2626;
}

/* REMOVE EXTRA SPACE FORCEFULLY */
section{
margin-bottom:0 !important;
padding-bottom:0 !important;
}

</style>

<section class="home">

<div class="work-container">

<div class="page-title">
📋 Your Assigned Works
</div>

<div class="work-grid">

{% for info in works %}

<div class="work-card">

<p class="label">Assigned To</p>
<p class="value">{{ info.taskerId }}</p>

<p class="label">Assign Date</p>
<p class="value">{{ info.assignDate }}</p>

<p class="label">Due Date</p>
<p class="value">{{ info.dueDate }}</p>

<div class="btn-group">

<a href="{% url 'workdetails' wid=info.id %}" class="btn btn-view">
View
</a>

<a href="{% url 'updatework' wid=info.id %}" class="btn btn-edit">
Edit
</a>

<a href="{% url 'deletework' wid=info.id %}" class="btn btn-delete">
Delete
</a>

</div>

</div>

{% empty %}

<p style="color:#cbd5f5;">No assigned work found.</p>

{% endfor %}

</div>

</div>

</section>

{% endblock %}
